apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  namespace: remediator-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
    spec:
      containers:
      - name: app
        image: nginx:1.25.0
        env:
        - name: DATABASE_URL
          value: postgres://localhost:5432/mydb
        - name: LOG_LEVEL
          value: info
